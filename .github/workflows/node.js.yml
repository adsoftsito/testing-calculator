name: Angular CI/CD

on:
  push:
    branches: [ master, develop, hotfixes, release ]
  pull_request:
    branches: [ master, develop, hotfixes, release ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [10.x]

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci
    - run: npm run test-headless    
    - run: npm run build --if-present

    - name: list dir
      run: ls -la dist/testing-calculator

    - name: download, run httpd image
      run:  | 
          docker run -d --name serving_base httpd

    - name: docker ps
      run:  | 
          docker ps

    - name: cp angular build to container
      run:  | 
          docker cp  dist/testing-calculator/. serving_base:/usr/local/apache2/htdocs

    - name: list container
      run:  | 
          docker exec serving_base ls -la /usr/local/apache2/htdocs

    - name: build custom docker image
      run:  docker commit --change  "ENV MODEL_NAME  ${{ secrets.MODEL_NAME }}"
              serving_base ${{ secrets.DOCKER_USER}}/${{secrets.MODEL_NAME}}       
     
    - name: list images
      run:  | 
          docker images
  
    - name: docker login
      env:
          DOCKER_USER: ${{secrets.DOCKER_USER}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run:  docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
        
    - name: docker push
      run:  docker push ${{ secrets.DOCKER_USER}}/${{secrets.MODEL_NAME}}   

    - name: Trigger Render Deploy
      run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}


