# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master, develop, hotfixes, release ]
  pull_request:
    branches: [ master, develop, hotfixes, release ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [10.x]

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci
    - run: npm run test-headless    
    - run: npm run build --if-present

    - name: list dir
      run: ls -la dist/testing-calculator

    - name: download, run httpd image
      run:  | 
          docker run -d --name serving_base httpd

    - name: docker ps
      run:  | 
          docker ps

    - name: cp angular build to container
      run:  | 
          docker cp  dist/testing-calculator/. serving_base:/usr/local/apache2/htdocs

    - name: list container
      run:  | 
          docker exec serving_base ls -la /usr/local/apache2/htdocs

